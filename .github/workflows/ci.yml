name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm install --legacy-peer-deps
      # Workspace packages export types from dist/; build before typecheck on clean checkout.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
