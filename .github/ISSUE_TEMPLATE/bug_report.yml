name: Bug report
description: Report a defect in the open-source packages or self-host worker
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. For **security** issues use [private advisories](https://github.com/erpipe-org/erpipe/security/advisories/new).
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@erpipe/core"
        - "@erpipe/odoo-xmlrpc"
        - "@erpipe/worker-selfhost"
        - scripts / harness
        - docs / other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps or a small code snippet.
      render: markdown
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Environment
      description: "e.g. Node 22, Odoo 18, commit SHA or tag"
    validations:
      required: false
